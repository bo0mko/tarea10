<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tarea10</title>
    <style>
        #container{
            width: 420px;
            height: 220px;
            border: 1px solid gray;
            padding: 5px;
            display: grid;
            grid-template-areas:
                  "uno dos dos tres"
                  "uno cinco siete cuatro"
                  "uno ocho seis cuatro";
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 5px;
        }
        .uno{
            grid-area: uno;
            background-color: green;
        }
        .dos{
            background-color: green;
            grid-area: dos;
        }
        .tres{
            background-color: red;
            grid-area: tres;
        }
        .cuatro{
            background-color: green;
            grid-area: cuatro;
        }
        .cinco{
            background-color: orange;
            grid-area: cinco;
        }
        .seis{
            background-color: orange;
            grid-area: seis;
        }
        .siete{
            background-color: red;
            grid-area: siete;
        }
        .ocho{
            background-color: red;
            grid-area: ocho;
        }
        .caja{
            width: 100%;
            height: 100%;
            border: 1px solid black;
            color: white;
            align-content: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Grid 1</h1>

    <div id="container">

        <div class="caja uno">UNO</div>
        <div class="caja dos">DOS</div>
        <div class="caja tres">TRES</div>
        <div class="caja cuatro">CUATRO</div>
        <div class="caja cinco">CINCO</div>
        <div class="caja seis">SEIS</div>
        <div class="caja siete">SIETE</div>
        <div class="caja ocho">OCHO</div>

    </div>
</body>
</html>
